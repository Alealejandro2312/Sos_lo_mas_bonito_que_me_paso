<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>💜</title>

<style>
body {
  margin: 0;
  height: 100vh;
  width: 100vw;
  position: relative;
  overflow: hidden;
  background: radial-gradient(circle at center, rgba(168,85,247,0.25) 0%, #1a0033 60%, #0b001a 100%);
  font-family: Arial, sans-serif;
}

/* FOTOS */
.fila {
  display: flex;
  justify-content: center;
  gap: 40px;
  width: 100%;
  position: relative;
  z-index: 2;
}

.fila.arriba { position: absolute; top: 60px; }
.fila.medio {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  justify-content: space-between;
  width: 80%;
  left: 10%;
}
.fila.abajo { position: absolute; bottom: 60px; }

.fila img {
  width: 180px;
  height: 180px;
  object-fit: cover;
  border-radius: 12px;
  opacity: 0;
  animation: aparecer 1s forwards, flotar 4s ease-in-out infinite;
}

img:nth-child(1) { animation-delay: 0.2s; }
img:nth-child(2) { animation-delay: 0.4s; }

@keyframes aparecer {
  to { opacity: 1; transform: scale(1); }
}

@keyframes flotar {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

/* POEMA */
.poema {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  max-width: 300px;
  z-index: 3;
}

.burbuja {
  background: rgba(255, 255, 255, 0.12);
  border-radius: 20px;
  padding: 10px;
  margin: 6px 0;
  backdrop-filter: blur(8px);
  opacity: 0;
  animation: aparecer 0.8s forwards;
}

/* AUDIO */
.audio-control {
  position: absolute;
  top: 60px;
  left: 20px;
  cursor: pointer;
  z-index: 4;
}

.corazon {
  font-size: 26px;
}

.corazon.activo {
  animation: latido 1s infinite;
}

@keyframes latido {
  50% { transform: scale(1.3); }
}

/* FINAL */
#final {
  position: absolute;
  bottom: 100px;
  width: 100%;
  text-align: center;
  opacity: 0;
  animation: aparecerFinal 2s forwards;
  animation-delay: 5s;
}

@keyframes aparecerFinal {
  to { opacity: 0.8; }
}

/* BOTONES */
.boton-secreto {
  position: fixed;
  padding: 12px 18px;
  border: none;
  border-radius: 18px;
  cursor: pointer;
  color: white;
  background: linear-gradient(45deg, #a855f7, #7c3aed);
  box-shadow: 0 0 15px rgba(168,85,247,0.5);
  font-weight: bold;
  z-index: 999;
}

.boton-arriba {
  top: 40px;
  right: 15px;
}

.boton-abajo {
  bottom: 30px;
  left: 20px;
}

/* MODAL */
#mensajeMemotest {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(11, 0, 26, 0.95);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.contenido {
  background: rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(10px);
  animation: pop 0.4s ease;
}

@keyframes pop {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

#mensajeMemotest button {
  margin-top: 10px;
  padding: 10px 20px;
  border-radius: 12px;
  border: none;
  background: #a855f7;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<audio id="musica" loop>
  <source src="audio.mp3" type="audio/mpeg">
</audio>

<!-- FOTOS -->
<div class="fila arriba">
  <img src="foto1.jpg">
  <img src="foto2.jpg">
</div>

<div class="fila medio">
  <img src="foto3.jpg">
  <img src="foto4.jpg">
</div>

<div class="fila abajo">
  <img src="foto5.jpg">
  <img src="foto6.jpg">
</div>

<!-- POEMA -->
<div class="poema">
  <div class="burbuja">te quiero…</div>
  <div class="burbuja">y no es algo chiquito</div>
  <div class="burbuja">me hacés bien</div>
  <div class="burbuja">me encanta todo con vos</div>
  <div class="burbuja">sos lo mejor</div>
  <div class="burbuja">💜</div>
</div>

<!-- AUDIO -->
<div class="audio-control" onclick="playMusic()">
  <span class="corazon">💜</span>
</div>

<!-- FINAL -->
<div id="final">
  gracias por estar en mi vida 💜
</div>

<!-- MODAL -->
<div id="mensajeMemotest" onclick="cerrarMemotest(event)">
  <div class="contenido">
    <p>tengo un jueguito para vos… 😏💜</p>
    <button onclick="irMemotest()">Jugar 💜</button>
  </div>
</div>

<!-- BOTONES -->
<button class="boton-secreto boton-arriba" onclick="entrar()">
  23/12/2005 💜 20/01/2003
</button>

<button class="boton-secreto boton-abajo" onclick="abrirMemotest()">
  Tengo algo más para vos 💌
</button>

<script>
function playMusic() {
  const audio = document.getElementById("musica");
  const corazon = document.querySelector(".corazon");
  audio.play();
  corazon.classList.add("activo");
}

function entrar() {
  window.location.href = "crucigrama.html";
}

function abrirMemotest() {
  document.getElementById("mensajeMemotest").style.display = "flex";
}

function cerrarMemotest(e) {
  if (e.target.id === "mensajeMemotest") {
    document.getElementById("mensajeMemotest").style.display = "none";
  }
}

function irMemotest() {
  window.location.href = "memotest.html";
}
</script>

</body>
</html>
