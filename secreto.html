<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>💜</title>

<style>
body {
  margin: 0;
  height: 100vh;
  width: 100vw;
  position: relative;
  overflow: hidden;

  background: radial-gradient(circle at center, rgba(168,85,247,0.25) 0%, #1a0033 60%, #0b001a 100%);
  background-repeat: no-repeat;
  background-size: cover;

  font-family: Arial, sans-serif;
}

/* FOTOS */
.fila {
  display: flex;
  justify-content: center;
  gap: 40px;
  width: 100%;
  position: relative;
  z-index: 2;
}

.fila.arriba {
  position: absolute;
  top: 60px;
}

.fila.medio {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  justify-content: space-between;
  width: 80%;
  left: 10%;
}

.fila.abajo {
  position: absolute;
  bottom: 60px;
}

.fila img {
  width: 180px;
  height: 180px;
  object-fit: cover;
  border-radius: 12px;
  opacity: 0;
  transform: scale(0.8);
  animation: aparecer 1s forwards, flotar 4s ease-in-out infinite;
}

img:nth-child(1) { animation-delay: 0.2s; }
img:nth-child(2) { animation-delay: 0.4s; }

@keyframes aparecer {
  to { opacity: 1; transform: scale(1); }
}

@keyframes flotar {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

/* POEMA */
.poema {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  max-width: 300px;
  line-height: 1.5;
  font-size: 16px;
  z-index: 3;
  text-shadow: 0 0 10px rgba(168,85,247,0.6);
}

.burbuja {
  background: rgba(255, 255, 255, 0.12);
  border-radius: 20px;
  padding: 10px 14px;
  margin: 6px 0;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  font-size: 15px;

  opacity: 0;
  transform: translateY(10px);
  animation: aparecer 0.8s forwards;
}

.burbuja:nth-child(1) { animation-delay: 0.3s; }
.burbuja:nth-child(2) { animation-delay: 0.8s; }
.burbuja:nth-child(3) { animation-delay: 1.3s; }
.burbuja:nth-child(4) { animation-delay: 1.8s; }
.burbuja:nth-child(5) { animation-delay: 2.3s; }
.burbuja:nth-child(6) { animation-delay: 2.8s; }

/* AUDIO */
.audio-control {
  position: absolute;
  top: 60px;
  left: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  z-index: 4;
}

.texto {
  font-size: 15px;
  max-width: 170px;
  opacity: 0.85;
  color: white;
  line-height: 1.5;
}

.corazon {
  font-size: 26px;
  transition: 0.3s;
}

.corazon.activo {
  animation: latido 1s infinite;
}

@keyframes latido {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* FINAL */
#final {
  position: absolute;
  bottom: 100px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  opacity: 0;
  animation: aparecerFinal 2s forwards;
  animation-delay: 5s;
  z-index: 4;
}

@keyframes aparecerFinal {
  to { opacity: 0.8; }
}

/* BRILLITOS */
body::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: brillo 6s linear infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes brillo {
  from { transform: translateY(0); }
  to { transform: translateY(40px); }
}

/* BOTÓN */
.boton-secreto {
  position: fixed;
  top: 40px;
  right: 15px;
  padding: 12px 18px;
  font-size: 14px;
  border: none;
  border-radius: 18px;
  cursor: pointer;
  color: white;
  background: linear-gradient(45deg, #a855f7, #7c3aed);
  box-shadow: 0 0 15px rgba(168,85,247,0.5);
  transition: 0.3s ease;
  font-weight: bold;
  z-index: 999;
}

.boton-secreto:hover {
  transform: scale(1.08);
}
</style>
</head>

<body>

<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- ARRIBA -->
<div class="fila arriba">
  <img src="foto1.jpg">
  <img src="foto2.jpg">
</div>

<!-- MEDIO -->
<div class="fila medio">
  <img src="foto3.jpg">
  <img src="foto4.jpg">
</div>

<!-- ABAJO -->
<div class="fila abajo">
  <img src="foto5.jpg">
  <img src="foto6.jpg">
</div>

<!-- POEMA -->
<div class="poema">
  <div class="burbuja">te quiero…</div>
  <div class="burbuja">y no es algo chiquito, es de verdad</div>
  <div class="burbuja">me hacés bien, en serio</div>
  <div class="burbuja">me encanta cada momento con vos</div>
  <div class="burbuja">sos lo más bonito que me pasó</div>
  <div class="burbuja">soy tuyo 💜</div>
</div>

<!-- AUDIO CONTROL -->
<div class="audio-control" onclick="playMusic()">
  <span class="texto">
    lo que escucho en mi cabeza<br>
    cuando paso tiempo a tu lado
  </span>
  <span class="corazon">💜</span>
</div>

<!-- FINAL -->
<div id="final">
  gracias por estar en mi vida 💜
</div>

<button class="boton-secreto" onclick="entrar()">
  23/12/2005 💜 20/01/2003
</button>

<script>
function playMusic() {
  const audio = document.getElementById("musica");
  const corazon = document.querySelector(".corazon");

  audio.play();
  corazon.classList.add("activo");
}

function entrar() {
  window.location.href = "crucigrama.html";
}
</script>

</body>
</html>
