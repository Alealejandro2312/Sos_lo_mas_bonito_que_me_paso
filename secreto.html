<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>💜</title>


  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, rgba(168,85,247,0.25) 0%, #1a0033 60%, #0b001a 100%);
      display: grid;
      grid-template-rows: 1fr auto 1fr;
      align-items: center;
      justify-items: center;
      gap: 20px;
      color: white;
      font-family: Arial, sans-serif;
    }


    .fila {
      display: flex;
      justify-content: center;
      gap: 40px;
      width: 100%;
    }


    .fila.arriba img,
    .fila.abajo img {
      width: 180px;
      height: 180px;
    }


    .fila.medio {
      justify-content: space-between;
      width: 80%;
    }


    .fila.medio img {
  width: 180px;
  height: 180px;
    }


    img {
      object-fit: cover;
      border-radius: 12px;
      opacity: 0;
      transform: scale(0.8);
      animation: aparecer 1s forwards;
    }


    img:nth-child(1) { animation-delay: 0.2s; }
    img:nth-child(2) { animation-delay: 0.4s; }


    @keyframes aparecer {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }


    .poema {
      position: absolute;
      text-align: center;
      max-width: 300px;
      line-height: 1.5;
      font-size: 16px;
      opacity: 0;
      animation: fade 2s forwards;
      animation-delay: 1s;
    }


    @keyframes fade {
      to {
        opacity: 1;
      }
    }


    .audio-control {
  position: absolute;
  top: 35px;
  left: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}

.texto {
  font-size: 15px;
  max-width: 170px;
  opacity: 0.85;
  font-family: "Poppins", "Segoe UI", sans-serif;
  line-height: 1.5;
  text-align: left;
}

.corazon {
  font-size: 26px;
  transition: 0.3s;
}

.corazon:hover {
  transform: scale(1.2);
}

.corazon.activo {
  animation: latido 1s infinite;
}

@keyframes latido {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

.poema {
  opacity: 0;
  animation: fade 2s forwards;
  animation-delay: 1s;
}

.burbuja {
  background: rgba(255, 255, 255, 0.12);
  border-radius: 20px;
  padding: 10px 14px;
  margin: 6px 0;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  font-size: 15px;
}

.burbuja {
  opacity: 0;
  transform: translateY(10px);
  animation: aparecer 0.8s forwards;
}

.burbuja:nth-child(1) { animation-delay: 0.3s; }
.burbuja:nth-child(2) { animation-delay: 0.8s; }
.burbuja:nth-child(3) { animation-delay: 1.3s; }
.burbuja:nth-child(4) { animation-delay: 1.8s; }
.burbuja:nth-child(5) { animation-delay: 2.3s; }
.burbuja:nth-child(6) { animation-delay: 2.8s; }

@keyframes aparecer {
  to {
    opacity: 1;
    transform: translateY(0);
  }

  </style>
</head>


<body>


<audio id="musica" loop>
  <source src="audio.mp3" type="audio/mpeg">
</audio>


<!-- ARRIBA -->
<div class="fila arriba">
  <img src="foto1.jpg">
  <img src="foto2.jpg">
</div>


<!-- MEDIO (separadas al máximo) -->
<div class="fila medio">
  <img src="foto3.jpg">
  <img src="foto4.jpg">
</div>


<!-- ABAJO -->
<div class="fila abajo">
  <img src="foto5.jpg">
  <img src="foto6.jpg">
</div>


<!-- POEMA EN EL CENTRO -->
<div class="poema">
  <div class="burbuja">te quiero…</div>
  <div class="burbuja">y no es algo chiquito, es de verdad</div>
  <div class="burbuja">me hacés bien, en serio</div>
  <div class="burbuja">me encanta cada momento con vos</div>
  <div class="burbuja">sos lo más bonito que me pasó</div>
  <div class="burbuja">soy tuyo 💜</div>
</div>


<div class="audio-control" onclick="playMusic()">
  <span class="texto">
    lo que escucho en mi cabeza<br>
    cuando paso tiempo a tu lado
  </span>
  <span class="corazon">💜</span>
</div>

<script>
function playMusic() {
  const audio = document.getElementById("musica");
  const corazon = document.querySelector(".corazon");

  audio.play();
  corazon.classList.add("activo");
}
</script>


</body>
</html>
