<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>💜</title>


  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, rgba(168,85,247,0.25) 0%, #1a0033 60%, #0b001a 100%);
      display: grid;
      grid-template-rows: 1fr auto 1fr;
      align-items: center;
      justify-items: center;
      gap: 20px;
      color: white;
      font-family: Arial, sans-serif;
    }


    .fila {
      display: flex;
      justify-content: center;
      gap: 40px;
      width: 100%;
    }


    .fila.arriba img,
    .fila.abajo img {
      width: 110px;
      height: 110px;
    }


    .fila.medio {
      justify-content: space-between;
      width: 80%;
    }


    .fila.medio img {
  width: 160px;
  height: 160px;
    }


    img {
      object-fit: cover;
      border-radius: 12px;
      opacity: 0;
      transform: scale(0.8);
      animation: aparecer 1s forwards;
    }


    img:nth-child(1) { animation-delay: 0.2s; }
    img:nth-child(2) { animation-delay: 0.4s; }


    @keyframes aparecer {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }


    .poema {
      position: absolute;
      text-align: center;
      max-width: 300px;
      line-height: 1.5;
      font-size: 16px;
      opacity: 0;
      animation: fade 2s forwards;
      animation-delay: 1s;
    }


    @keyframes fade {
      to {
        opacity: 1;
      }
    }


    .audio-control {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}

.texto {
  font-size: 14px;
  max-width: 120px;
  opacity: 0.8;
}

.corazon {
  font-size: 28px;
  transition: 0.3s;
}

.corazon:hover {
  transform: scale(1.2);
}

  </style>
</head>


<body>


<audio id="musica" loop>
  <source src="audio.mp3" type="audio/mpeg">
</audio>


<!-- ARRIBA -->
<div class="fila arriba">
  <img src="foto1.jpg">
  <img src="foto2.jpg">
</div>


<!-- MEDIO (separadas al máximo) -->
<div class="fila medio">
  <img src="foto3.jpg">
  <img src="foto4.jpg">
</div>


<!-- ABAJO -->
<div class="fila abajo">
  <img src="foto5.jpg">
  <img src="foto6.jpg">
</div>


<!-- POEMA EN EL CENTRO -->
<div class="poema">
  <p>
    Me gusta escucharte,\n
    me gusta encontrarte en cada momento,\n
    y aunque no estés acá,\n
    te siento cerca todo el tiempo 💜
  </p>
</div>


<div class="audio-control" onclick="playMusic()">
  <span class="texto">lo que escucho en mi cabeza cuando paso tiempo a tu lado</span>
  <span class="corazon">💜</span>
</div>

<script>
function playMusic() {
  const audio = document.getElementById("musica");
  audio.play();
}
</script>


</body>
</html>
