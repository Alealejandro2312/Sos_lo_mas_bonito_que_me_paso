<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌌</title><style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #0b001a, #000);
  font-family: Arial, sans-serif;
  color: white;
}


.star {
  position: absolute;
  width: 12px;
  height: 12px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 10px white;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
}


.star.active {
  background: #c084fc;
  box-shadow: 0 0 20px #c084fc;
}


.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(20, 0, 40, 0.95);
  padding: 20px;
  border-radius: 15px;
  display: none;
  width: 80%;
  max-width: 300px;
  text-align: center;
}


textarea {
  width: 100%;
  border-radius: 10px;
  border: none;
  padding: 10px;
  margin-top: 10px;
}


button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #a855f7;
  color: white;
  cursor: pointer;
}


#viewBtn {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}


#constellationView {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  overflow-y: auto;
  padding: 20px;
}


.entry {
  margin-bottom: 20px;
  padding: 10px;
  border-bottom: 1px solid #555;
}
</style></head><body><div id="popup" class="popup">
  <div id="question"></div>
  <div id="yourAnswer" style="margin-top:10px; font-size: 14px;"></div>
  <textarea id="input" placeholder="tu respuesta..."></textarea>
  <button onclick="saveAnswer()">guardar ✨</button>
</div><button id="viewBtn" onclick="openConstellation()">ver nuestra constelación 🌌</button>


<div id="constellationView">
  <h2>🌌 nuestra constelación</h2>
  <div id="entries"></div>
  <button onclick="closeConstellation()">cerrar</button>
</div><script>
const data = [
  {q: "mi comida favorita 🍝", a: "milanesa"},
  {q: "algo que me hace feliz 😊", a: "hablar con vos"},
  {q: "algo que me recuerda a vos 💭", a: "las noches juntos"},
  {q: "mi momento favorito 💜", a: "cuando estamos en llamada"}
];


let currentIndex = null;


// crear estrellas
for (let i = 0; i < data.length; i++) {
  const star = document.createElement("div");
  star.className = "star";
  star.style.top = Math.random() * 90 + "%";
  star.style.left = Math.random() * 90 + "%";


  star.onclick = () => openPopup(i, star);
  document.body.appendChild(star);
}


function openPopup(index, star) {
  currentIndex = index;
  document.getElementById("popup").style.display = "block";
  document.getElementById("question").innerText = data[index].q;
  document.getElementById("yourAnswer").innerText = "yo: " + data[index].a;


  const saved = localStorage.getItem("star_" + index);
  document.getElementById("input").value = saved || "";
}


function saveAnswer() {
  const text = document.getElementById("input").value;
  if (!text) return;


  localStorage.setItem("star_" + currentIndex, text);


  document.getElementById("popup").style.display = "none";


  // animación simple
  const stars = document.querySelectorAll(".star");
  stars[currentIndex].classList.add("active");
}


function openConstellation() {
  document.getElementById("constellationView").style.display = "block";
  const container = document.getElementById("entries");
  container.innerHTML = "";


  data.forEach((item, i) => {
    const her = localStorage.getItem("star_" + i);
    if (her) {
      const div = document.createElement("div");
      div.className = "entry";
      div.innerHTML = `
        <strong>${item.q}</strong><br>
        yo: ${item.a}<br>
        vos: ${her}
      `;
      container.appendChild(div);
    }
  });
}


function closeConstellation() {
  document.getElementById("constellationView").style.display = "none";
}
</script></body>
</html>
