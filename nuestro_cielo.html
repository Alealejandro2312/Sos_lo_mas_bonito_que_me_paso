<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>Libro para vos 💙</title><style>
body {
  margin: 0;
  background: linear-gradient(135deg, #0d0d1a, #1a1a40);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

.libro {
  width: 350px;
  height: 500px;
  background: #2a2a5a;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
  position: relative;
  overflow: hidden;
}

.pagina {
  position: absolute;
  width: 100%;
  height: 100%;
  padding: 20px;
  display: none;
  flex-direction: column;
  justify-content: space-between;
  animation: fade 0.5s ease;
}

.pagina.activa {
  display: flex;
}

h2 {
  text-align: center;
}

.texto {
  text-align: center;
  font-size: 16px;
}

.galeria {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

.foto {
  width: 90px;
  height: 120px;
  object-fit: cover;
  border: 3px solid white;
  border-radius: 10px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.5);
}

.rot1 { transform: rotate(-5deg); }
.rot2 { transform: rotate(4deg); }
.rot3 { transform: rotate(-3deg); }

.botones-audio {
  display: flex;
  justify-content: center;
  gap: 10px;
}

button {
  border: none;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  background: #4b6cff;
  color: white;
}

.nav {
  position: absolute;
  bottom: 10px;
  width: 100%;
  display: flex;
  justify-content: space-between;
}

.nav button {
  background: #ffffff22;
}

@keyframes fade {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

.decoracion {
  position: absolute;
  font-size: 20px;
  opacity: 0.3;
}

.corazon1 { top: 10px; left: 10px; }
.corazon2 { bottom: 20px; right: 15px; }

</style></head><body><div class="libro"><!-- PAGINA 1 --><div class="pagina activa">
  <div class="decoracion corazon1">💙</div>
  <h2>Hola amorcito</h2>
  <div class="texto">Este es un pequeño pedacito de todo lo que siento por vos</div>  <div class="galeria">
    <img src="foto1.jpg" class="foto rot1">
    <img src="foto2.jpg" class="foto rot2">
  </div>  <div class="botones-audio">
    <button onclick="audio1.play()">🎧 Audio 1</button>
    <button onclick="audio2.play()">🎧 Audio 2</button>
  </div>
</div><!-- PAGINA 2 --><div class="pagina">
  <h2>Vos 💙</h2>
  <div class="texto">Me haces sentir cosas que nunca pensé sentir</div>  <div class="galeria">
    <img src="foto3.jpg" class="foto rot2">
