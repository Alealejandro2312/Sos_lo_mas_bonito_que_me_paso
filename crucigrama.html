<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solo para ti 💜</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #2e1065, #0b0018);
  font-family: Arial, sans-serif;
  color: white;
  overflow: hidden;
}

/* BRILLO FONDO */
body::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: rgba(168,85,247,0.25);
  filter: blur(120px);
  border-radius: 50%;
  top: -100px;
  left: -100px;
}

/* CONTENEDOR */
.container {
  display: flex;
  gap: 30px;
  background: rgba(255,255,255,0.06);
  padding: 25px;
  border-radius: 25px;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 40px rgba(168,85,247,0.35);
  z-index: 1;
}

/* TABLA */
table {
  border-collapse: collapse;
}

/* CELDAS */
td {
  width: 42px;
  height: 42px;
  border: 1px solid rgba(255,255,255,0.08);
  position: relative;
}

/* INPUT */
input {
  width: 100%;
  height: 100%;
  border: none;
  outline: none;
  text-align: center;
  text-transform: uppercase;
  font-size: 16px;
  background: rgba(168,85,247,0.12);
  color: white;
  transition: 0.2s;
}

input:focus {
  background: rgba(168,85,247,0.35);
  transform: scale(1.1);
  box-shadow: 0 0 10px rgba(168,85,247,0.6);
}

/* BLOQUES NEGROS */
.block {
  background: rgba(0,0,0,0.75);
  border: none;
}

/* NÚMEROS */
.num {
  position: absolute;
  top: 3px;
  left: 4px;
  font-size: 10px;
  color: #d8b4fe;
  opacity: 0.9;
}

/* PISTAS */
.clues {
  width: 260px;
}

h2 {
  color: #d8b4fe;
  text-shadow: 0 0 12px #a855f7;
}

p {
  opacity: 0.9;
  margin: 6px 0;
}

/* BOTÓN */
button {
  margin-top: 12px;
  padding: 10px 14px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(45deg, #a855f7, #6d28d9);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(168,85,247,0.5);
}

/* ANIMACIÓN WIN */
.win {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 28px;
  background: rgba(168,85,247,0.2);
  padding: 20px 30px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  display: none;
  text-align: center;
  box-shadow: 0 0 25px rgba(168,85,247,0.6);
}
</style>
</head>

<script>
function check() {
  const inputs = document.querySelectorAll("input");
  let ok = true;

  inputs.forEach(i => {
    if (i.dataset.a) {
      if (i.value.toUpperCase() !== i.dataset.a) {
        ok = false;
        i.style.background = "rgba(255,0,0,0.25)";
      } else {
        i.style.background = "rgba(0,255,160,0.25)";
      }
    }
  });

  if (ok) {
    document.getElementById("win").style.display = "block";
  } else {
    alert("💜 Casi… seguí intentando");
  }
}
</script>
