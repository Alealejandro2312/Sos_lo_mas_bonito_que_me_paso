<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crucigrama 💜</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #3b0764, #12001f);
  font-family: Arial, sans-serif;
  color: white;
}

/* CONTENEDOR */
.container {
  display: flex;
  gap: 40px;
  background: rgba(255,255,255,0.06);
  padding: 25px;
  border-radius: 22px;
  box-shadow: 0 0 30px rgba(168,85,247,0.4);
  backdrop-filter: blur(10px);
}

/* TABLA */
table {
  border-collapse: collapse;
}

td {
  width: 40px;
  height: 40px;
  border: 1px solid rgba(255,255,255,0.12);
  position: relative;
}

input {
  width: 100%;
  height: 100%;
  border: none;
  outline: none;
  text-align: center;
  text-transform: uppercase;
  font-size: 16px;
  background: rgba(168,85,247,0.12);
  color: white;
  border-radius: 5px;
}

/* CASILLAS NEGRAS */
.block {
  background: rgba(0,0,0,0.65);
}

/* NÚMEROS */
.num {
  position: absolute;
  top: 2px;
  left: 4px;
  font-size: 10px;
  opacity: 0.8;
  color: #d8b4fe;
}

/* PISTAS */
.clues {
  max-width: 260px;
}

h2 {
  color: #d8b4fe;
  text-shadow: 0 0 10px #a855f7;
}

p {
  opacity: 0.9;
  margin: 6px 0;
}

/* BOTÓN */
button {
  margin-top: 10px;
  padding: 10px 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, #a855f7, #7c3aed);
  color: white;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- ===== PISTAS (VACÍAS) ===== -->

<script>
function check() {
  const inputs = document.querySelectorAll("input");
  let ok = true;

  inputs.forEach(i => {
    if (i.dataset.a) {
      if (i.value.toUpperCase() !== i.dataset.a) {
        ok = false;
        i.style.background = "rgba(255,0,0,0.3)";
      } else {
        i.style.background = "rgba(0,255,150,0.25)";
      }
    }
  });

  if (ok) {
    alert("💜 Perfecto… lo resolviste");
  } else {
    alert("💜 Casi… seguí intentando");
  }
}
</script>
