<!DOCTYPE html>

<title>Solo para ti 💜</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #3b0764, #0a0015);
  font-family: Arial;
  color: white;
}

/* PARTICULAS */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #c084fc;
  border-radius: 50%;
  animation: float 8s infinite linear;
  opacity: 0.5;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* CONTENEDOR */
.container {
  display: flex;
  gap: 25px;
  background: rgba(255,255,255,0.06);
  padding: 20px;
  border-radius: 20px;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 40px rgba(168,85,247,0.3);
  z-index: 2;
}

/* TABLA */
table { border-collapse: collapse; }

td {
  width: 42px;
  height: 42px;
  border: 1px solid rgba(255,255,255,0.08);
  position: relative;
}

/* INPUT */
input {
  width: 100%;
  height: 100%;
  border: none;
  outline: none;
  text-align: center;
  text-transform: uppercase;
  background: rgba(168,85,247,0.12);
  color: white;
  transition: 0.2s;
}

input:focus {
  transform: scale(1.2);
  background: rgba(168,85,247,0.4);
  box-shadow: 0 0 12px #a855f7;
}

/* BLOQUES */
.block { background: rgba(0,0,0,0.75); }

/* NUMEROS */
.num {
  position: absolute;
  top: 3px;
  left: 4px;
  font-size: 10px;
  color: #d8b4fe;
}

/* PISTAS */
.clues {
  width: 260px;
}

h2 {
  color: #d8b4fe;
  text-shadow: 0 0 10px #a855f7;
}

/* BOTÓN */
button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg,#a855f7,#6d28d9);
  color: white;
  cursor: pointer;
}

/* BOTÓN SECRETO */
#secretBtn {
  position: absolute;
  top: 15px;
  right: 15px;
  padding: 10px 14px;
  border-radius: 12px;
  background: rgba(168,85,247,0.25);
  border: 1px solid rgba(168,85,247,0.5);
  cursor: pointer;
  backdrop-filter: blur(10px);
}

/* WIN SCREEN */
.win {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  background: rgba(168,85,247,0.2);
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  display: none;
  box-shadow: 0 0 30px #a855f7;
  z-index: 10;
}

/* AUDIO */
audio { display: none; }

</style>
</head>

<script>

/* partículas */
for(let i=0;i<40;i++){
  let p=document.createElement("div");

  p.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(p);
}

/* música */
let music=document.getElementById("music");
let playing=false;

function secret(){
  if(!playing){
    music.play();
    playing=true;
    alert("💜 música activada");
  } else {
    music.pause();
    playing=false;
  }
}

/* check */
function check(){
  let inputs=document.querySelectorAll("input");
  let ok=true;

  inputs.forEach(i=>{
    if(i.dataset.a){
      if(i.value.toUpperCase()!=i.dataset.a){
        ok=false;
        i.style.background="rgba(255,0,0,0.25)";
      } else {
        i.style.background="rgba(0,255,150,0.25)";
      }
    }
  });

  if(ok){
    document.getElementById("win").style.display="block";
  } else {
    alert("💜 casi…");
  }
}
