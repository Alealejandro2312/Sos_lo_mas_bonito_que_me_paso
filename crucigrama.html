<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crucigrama 💜</title>


<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #3b0764, #12001f);
  color: white;
}


/* tarjeta */
.container {
  display: flex;
  gap: 40px;
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(168,85,247,0.4);
  backdrop-filter: blur(10px);
  animation: float 4s ease-in-out infinite;
}


@keyframes float {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
}


/* tabla */
table {
  border-collapse: collapse;
}


td {
  width: 45px;
  height: 45px;
  border: 1px solid rgba(255,255,255,0.2);
}


input {
  width: 100%;
  height: 100%;
  border: none;
  outline: none;
  text-align: center;
  font-size: 18px;
  text-transform: uppercase;
  background: rgba(168,85,247,0.15);
  color: white;
  border-radius: 6px;
  transition: 0.2s;
}


input:focus {
  background: rgba(168,85,247,0.35);
  box-shadow: 0 0 8px #c084fc;
}


.block {
  background: rgba(0,0,0,0.5);
}


/* pistas */
.clues {
  max-width: 250px;
}


h2 {
  color: #d8b4fe;
  text-shadow: 0 0 10px #a855f7;
}


p {
  opacity: 0.9;
}


/* botón */
button {
  margin-top: 12px;
  padding: 10px 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, #a855f7, #7c3aed);
  color: white;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(168,85,247,0.4);
  transition: 0.2s;
}


button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(168,85,247,0.7);
}


/* resultado */
.result {
  margin-top: 10px;
  font-size: 14px;
}


</style>
</head>


<body>


<div class="container">


  <!-- CRUCIGRAMA -->
  <div>
    <table>
      <tr>
        <td><input maxlength="1" data-a="L"></td>
        <td><input maxlength="1" data-a="I"></td>
        <td><input maxlength="1" data-a="Z"></td>
        <td class="block"></td>
        <td><input maxlength="1" data-a="A"></td>
      </tr>


      <tr>
        <td><input maxlength="1" data-a="M"></td>
        <td class="block"></td>
        <td><input maxlength="1" data-a="O"></td>
        <td class="block"></td>
        <td><input maxlength="1" data-a="R"></td>
      </tr>


      <tr>
        <td><input maxlength="1" data-a="I"></td>
        <td><input maxlength="1" data-a="S"></td>
        <td><input maxlength="1" data-a="A"></td>
        <td><input maxlength="1" data-a="M"></td>
        <td><input maxlength="1" data-a="O"></td>
      </tr>
    </table>


    <button onclick="check()">Verificar 💜</button>
    <div class="result" id="res"></div>
  </div>


  <!-- PISTAS -->
  <div class="clues">
    <h2>💜 Pistas</h2>
    <p>1. Su nombre ✨</p>
    <p>2. Lo que sentimos 💜</p>
    <p>3. Lo que somos juntos</p>
  </div>


</div>
