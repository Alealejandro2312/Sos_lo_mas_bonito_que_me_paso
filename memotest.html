<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>💜 Memotest 💜</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #2a004f, #0b001a);
  font-family: Arial;
  color: white;
  text-align: center;
}

/* INFO */
#info {
  display: flex;
  justify-content: space-around;
  font-size: 14px;
  margin: 10px;
}

#info div {
  background: rgba(255,255,255,0.08);
  padding: 6px 10px;
  border-radius: 10px;
}

/* JUEGO */
#game {
  width: 95%;
  max-width: 600px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
}

.card {
  aspect-ratio: 1/1;
  position: relative;
  cursor: pointer;
}

.inner {
  position: absolute;
  inset: 0;
  transition: transform 0.5s;
  transform-style: preserve-3d;
}

.flipped .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  backface-visibility: hidden;
}

.front {
  background: #a855f7;
}

.back {
  transform: rotateY(180deg);
  background-size: cover;
  background-position: center;
}

/* BOTÓN MÚSICA */
.music-btn {
  position: fixed;
  top: 10px;
  left: 10px;
  background: #a855f7;
  border: none;
  padding: 10px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
}

/* FINAL */
#winScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0b001a;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

/* POEMA */
#poemaFinal {
  margin-top: 20px;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
  max-width: 300px;
  margin-left: auto;
  margin-right: auto;
}

#poemaFinal.mostrar {
  opacity: 1;
  transform: translateY(0);
}

button {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #a855f7;
  color: white;
}
</style>
</head>

<body>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<h1>💜 Memotest 💜</h1>

<div id="info">
  <div>⏱️ <span id="time">0</span>s</div>
  <div>🎯 <span id="moves">0</span></div>
  <div>💜 <span id="hits">0</span>/18</div>
</div>

<div id="game"></div>

<div id="winScreen">
  <h2>💌 GANASTE 💜</h2>
  <p>llegaste hasta el final… 💜</p>
  <button onclick="volver()">Volver</button>
</div>

<div id="poemaFinal">
  <p>
    y si llegaste hasta acá…<br>
    es porque valés cada segundo 💜<br>
    porque todo esto es para vos 😏
  </p>
</div>

<audio id="bgMusic" src="audio.mp3" loop></audio>
<audio id="flipSound" src="flip.mp3"></audio>
<audio id="matchSound" src="match.mp3"></audio>

<script>

// IMÁGENES
const images = [
  "1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg",
  "7.jpg","8.jpg","9.jpg","10.jpg","11.jpg","12.jpg",
  "13.jpg","14.jpg","15.jpg","16.jpg","17.jpg","18.jpg"
];

let cardsArray = [...images, ...images];
cardsArray.sort(() => Math.random() - 0.5);

const game = document.getElementById("game");

let firstCard = null;
let secondCard = null;
let lock = false;
let matches = 0;
let moves = 0;
let time = 0;

// tiempo
setInterval(() => {
  time++;
  document.getElementById("time").textContent = time;
}, 1000);

// crear cartas
cardsArray.forEach(img => {
  const card = document.createElement("div");
  card.classList.add("card");

  card.innerHTML = `
    <div class="inner">
      <div class="front"></div>
      <div class="back" style="background-image:url('${img}')"></div>
    </div>
  `;

  card.addEventListener("click", () => {
    if (lock || card.classList.contains("flipped")) return;

    document.getElementById("flipSound").play().catch(()=>{});

    card.classList.add("flipped");

    if (!firstCard) {
      firstCard = card;
      return;
    }

    secondCard = card;
    lock = true;
    moves++;
    document.getElementById("moves").textContent = moves;

    const img1 = firstCard.querySelector(".back").style.backgroundImage;
    const img2 = secondCard.querySelector(".back").style.backgroundImage;

    if (img1 === img2) {
      matches++;
      document.getElementById("hits").textContent = matches;

      document.getElementById("matchSound").play().catch(()=>{});

      firstCard = null;
      secondCard = null;
      lock = false;

      if (matches === 18) {
        setTimeout(() => {
          document.getElementById("winScreen").style.display = "flex";

          setTimeout(() => {
            document.getElementById("poemaFinal").classList.add("mostrar");
          }, 1500);

        }, 500);
      }

    } else {
      setTimeout(() => {
        firstCard.classList.remove("flipped");
        secondCard.classList.remove("flipped");
        firstCard = null;
        secondCard = null;
        lock = false;
      }, 800);
    }
  });

  game.appendChild(card);
});

// música
function toggleMusic() {
  const music = document.getElementById("bgMusic");
  if (music.paused) {
    music.play();
  } else {
    music.pause();
  }
}

// volver
function volver() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
